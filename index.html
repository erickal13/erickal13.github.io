<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            font-size: 3em;
            color: #FF4500;
        }
        #search-container {
            margin: 20px 0;
        }
        #pokemon-input {
            width: 300px;
            padding: 10px;
            border: 2px solid #FF4500;
            border-radius: 5px;
            background-color: #232323;
            color: white;
        }
        #search-button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #FF4500;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        #search-button:hover {
            background-color: #FF6347;
            box-shadow: 0 0 10px rgba(255, 69, 0, 0.8);
        }
        #results {
            margin-top: 20px;
            width: 100%;
            max-width: 600px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Pokédex 🎉</h1>
    <div id="search-container">
        <input type="text" id="pokemon-input" placeholder="Enter Pokémon name..." />
        <button id="search-button">Search</button>
    </div>
    <div id="results"></div>
    <script>
        document.getElementById('search-button').addEventListener('click', function() {
            const input = document.getElementById('pokemon-input').value;
            const resultsDiv = document.getElementById('results');
            if(input) {
                resultsDiv.innerHTML = `You searched for: ${input}`;
            } else {
                resultsDiv.innerHTML = 'Please enter a Pokémon name.';
            }
        });
    </script>
</body>
</html>
