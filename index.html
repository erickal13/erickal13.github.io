<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .type-badge { display: inline-block; padding: 5px; margin: 2px; border-radius: 5px; color: white; }
        /* Example colors for Pokémon types */
        .grass { background-color: #78C850; }
        .fire { background-color: #F08030; }
        .water { background-color: #6890F0; }
        /* Add more types as needed */
    </style>
</head>
<body>
    <h1>Pokédex</h1>
    <button id="random-button">Random Pokémon</button>
    <div id="pokemon-info"></div>

    <script>
        const pokeInfoDiv = document.getElementById('pokemon-info');
        const randomButton = document.getElementById('random-button');

        async function fetchRandomPokemon() {
            const id = Math.floor(Math.random() * 898) + 1; // There are 898 Pokémon
            const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
            const data = await response.json();
            displayPokemon(data);
        }

        function displayPokemon(pokemon) {
            const types = pokemon.types.map(type => `<span class='type-badge ${type.type.name}'>${type.type.name}</span>`).join(' ');
            const stats = pokemon.stats.map(stat => `<p>${stat.stat.name}: ${stat.base_stat}</p>`).join(' ');
            pokeInfoDiv.innerHTML = `<h2>${pokemon.name}</h2>
                                     <img src='https://pokeapi.co/media/sprites/pokemon/${pokemon.id}.png' alt='${pokemon.name}' />
                                     <p>Height: ${pokemon.height / 10} m</p>
                                     <p>Weight: ${pokemon.weight / 10} kg</p>
                                     <div>Types: ${types}</div>
                                     <div>Stats: ${stats}</div>`;
        }

        randomButton.addEventListener('click', fetchRandomPokemon);
    </script>
</body>
</html>
