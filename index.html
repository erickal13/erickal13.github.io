<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Info 💥</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
        }
        h1 {
            text-align: center;
        }
        .search-container {
            text-align: center;
            margin: 20px;
        }
        .search-button {
            background-color: red;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            transition: box-shadow 0.3s;
        }
        .search-button:hover {
            box-shadow: 0 0 10px white;
        }
        .badge {
            padding: 5px;
            border-radius: 5px;
            display: inline-block;
            margin-right: 5px;
        }
        .loading {
            text-align: center;
            font-size: 20px;
            display: none;
        }
        .random-button { 
            background-color: #ffcc00;
            color: black;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
        }
        .random-button:hover {
            background-color: #ffc107;
        }
    </style>
</head>
<body>
    <h1>Pokémon Info 💥</h1>
    <div class="search-container">
        <input type="text" id="pokemon-input" placeholder="🖋️ Type Pokémon name..." />
        <button class="search-button" onclick="fetchPokemon()">Search</button>
        <button class="random-button" onclick="fetchRandomPokemon()">Random Pokémon</button>
    </div>
    <div class="loading" id="loading">Loading...</div>
    <div id="pokemon-stats" style="display:none;">
        <h2 id="pokemon-name"></h2>
        <img id="pokemon-image" src="" alt="Pokémon Image" />
        <div id="types"></div>
        <p>Height: <span id="pokemon-height"></span></p>
        <p>Weight: <span id="pokemon-weight"></span></p>
        <div id="error-message" style="color: red; display: none;"></div>
    </div>

    <script>
        const fetchPokemon = async () => {
            const pokemonName = document.getElementById('pokemon-input').value;
            document.getElementById('loading').style.display = 'block';
            document.getElementById('error-message').style.display = 'none';
            document.getElementById('pokemon-stats').style.display = 'none';
            try {
                const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${pokemonName.toLowerCase()}`);
                if (!response.ok) throw new Error('Pokémon not found');
                const data = await response.json();
                document.getElementById('pokemon-name').textContent = data.name;
                document.getElementById('pokemon-height').textContent = data.height;
                document.getElementById('pokemon-weight').textContent = data.weight;
                document.getElementById('pokemon-image').src = data.sprites.front_default;
                document.getElementById('types').innerHTML = '';
                data.types.forEach(type => {
                    const badge = document.createElement('span');
                    badge.textContent = type.type.name;
                    badge.className = 'badge ' + type.type.name;
                    badge.style.backgroundColor = getTypeColor(type.type.name);
                    document.getElementById('types').appendChild(badge);
                });
                document.getElementById('pokemon-stats').style.display = 'block';
            } catch (error) {
                document.getElementById('error-message').textContent = error.message;
                document.getElementById('error-message').style.display = 'block';
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        };

        const fetchRandomPokemon = async () => {
            const randomId = Math.floor(Math.random() * 898) + 1; // There are 898 Pokémon
            const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${randomId}`);
            const data = await response.json();
            document.getElementById('pokemon-name').textContent = data.name;
            document.getElementById('pokemon-height').textContent = data.height;
            document.getElementById('pokemon-weight').textContent = data.weight;
            document.getElementById('pokemon-image').src = data.sprites.front_default;
            document.getElementById('types').innerHTML = '';
            data.types.forEach(type => {
                const badge = document.createElement('span');
                badge.textContent = type.type.name;
                badge.className = 'badge ' + type.type.name;
                badge.style.backgroundColor = getTypeColor(type.type.name);
                document.getElementById('types').appendChild(badge);
            });
            document.getElementById('pokemon-stats').style.display = 'block';
        };

        const getTypeColor = (type) => {
            switch (type) {
                case 'grass': return '#78C850';
                case 'fire': return '#F08030';
                case 'water': return '#6890F0';
                case 'bug': return '#A8B820';
                case 'normal': return '#A8A878';
                case 'poison': return '#A040B2';
                case 'electric': return '#F8D030';
                case 'ground': return '#E0C068';
                case 'fairy': return '#F0B0B0';
                case 'fighting': return '#C03028';
                case 'psychic': return '#F85888';
                case 'rock': return '#B8A038';
                case 'ghost': return '#705898';
                case 'ice': return '#98D8D8';
                case 'dragon': return '#7038F8';
                case 'dark': return '#705848';
                default: return '#878787';
            }
        };
    </script>
</body>
</html>
