                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        h1 {
            font-size: 3em;
            color: #FF4500;
        }
        #search-container {
            margin: 20px 0;
        }
        #pokemon-input {
            width: 300px;
            padding: 10px;
            border: 2px solid #FF4500;
            border-radius: 5px;
            background-color: #232323;
            color: white;
            font-size: 16px;
        }
        #search-button, #random-button {
            padding: 10px 20px;
            margin: 0 5px;
            border: none;
            border-radius: 5px;
            background-color: #FF4500;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
        }
        #search-button:hover, #random-button:hover {
            background-color: #FF6347;
            box-shadow: 0 0 15px rgba(255, 69, 0, 0.8);
        }
        #results {
            margin-top: 30px;
            width: 100%;
            max-width: 600px;
            text-align: center;
        }
        .pokemon-card {
            background-color: #1e1e1e;
            border: 2px solid #FF4500;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(255, 69, 0, 0.3);
        }
        .pokemon-card h2 {
            margin: 0;
            font-size: 2em;
            color: #FF4500;
        }
        .pokemon-card img {
            width: 200px;
            height: 200px;
        }
        .type-badge {
            display: inline-block;
            padding: 8px 12px;
            margin: 5px;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            text-transform: capitalize;
        }
        .type-normal { background-color: #A8A77A; }
        .type-fire { background-color: #EE8130; }
        .type-water { background-color: #6390F0; }
        .type-electric { background-color: #F7D02C; }
        .type-grass { background-color: #7AC74C; }
        .type-ice { background-color: #96D9D6; }
        .type-fighting { background-color: #C22E1C; }
        .type-poison { background-color: #A33EA7; }
        .type-ground { background-color: #E2C247; }
        .type-flying { background-color: #A98FF3; }
        .type-psychic { background-color: #F85888; }
        .type-bug { background-color: #A6B91A; }
        .type-rock { background-color: #B6A136; }
        .type-ghost { background-color: #735797; }
        .type-dragon { background-color: #6F35FC; }
        .type-dark { background-color: #705746; }
        .type-steel { background-color: #B7B7CE; }
        .type-fairy { background-color: #EE99AC; }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
            text-align: left;
        }
        .stat {
            background-color: #232323;
            padding: 10px;
            border-radius: 5px;
            border-left: 3px solid #FF4500;
        }
        .stat-label {
            color: #FF4500;
            font-weight: bold;
            font-size: 14px;
        }
        .stat-value {
            font-size: 20px;
            color: white;
        }
        .loading {
            font-size: 18px;
            color: #FF4500;
        }
        .error {
            color: #FF6347;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <h1>🔴 Pokédex</h1>
    <div id="search-container">
        <input type="text" id="pokemon-input" placeholder="Enter Pokémon name..." />
        <button id="search-button">Search</button>
        <button id="random-button">🎲 Random</button>
    </div>
    <div id="results"></div>

    <script>
        const searchPokemon = async (name) => {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<p class="loading">Searching...</p>';

            try {
                const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${name.toLowerCase()}`);
                if (!response.ok) throw new Error('Pokémon not found');
                const data = await response.json();
                displayPokemon(data);
            } catch (error) {
                resultsDiv.innerHTML = `<p class="error">❌ Pokémon not found! Try another name.</p>`;
            }
        };

        const getRandomPokemon = async () => {
            const randomId = Math.floor(Math.random() * 1010) + 1;
            searchPokemon(randomId.toString());
        };

        const displayPokemon = (pokemon) => {
            const resultsDiv = document.getElementById('results');
            const types = pokemon.types
                .map(t => `<span class="type-badge type-${t.type.name}">${t.type.name}</span>`)
                .join('');
            
            const stats = pokemon.stats.slice(0, 3);
            const statsHtml = stats.map(stat => `
                <div class="stat">
                    <div class="stat-label">${stat.stat.name.toUpperCase()}</div>
                    <div class="stat-value">${stat.base_stat}</div>
                </div>
            `).join('');

            const heightM = (pokemon.height / 10).toFixed(1);
            const weightKg = (pokemon.weight / 10).toFixed(1);

            resultsDiv.innerHTML = `
                <div class="pokemon-card">
                    <h2>${pokemon.name.charAt(0).toUpperCase() + pokemon.name.slice(1)}</h2>
                    <img src="${pokemon.sprites.front_default}" alt="${pokemon.name}" />
                    <div>${types}</div>
                    <div class="stats">${statsHtml}</div>
                    <p><strong>Height:</strong> ${heightM}m</p>
                    <p><strong>Weight:</strong> ${weightKg}kg</p>
                </div>
            `;
        };

        document.getElementById('search-button').addEventListener('click', () => {
            const input = document.getElementById('pokemon-input').value.trim();
            if (input) {
                searchPokemon(input);
            } else {
                document.getElementById('results').innerHTML = '<p class="error">Please enter a Pokémon name!</p>';
            }
        });

        document.getElementById('random-button').addEventListener('click', getRandomPokemon);

        // Allow Enter key to search
        document.getElementById('pokemon-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('search-button').click();
            }
        });
    </script>
</body>
</html>
