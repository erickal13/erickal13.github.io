<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Pokémon API Integration</title>\n    <style>\n        .badge {\n            display: inline-block;\n            padding: 5px;\n            margin: 5px;\n            border-radius: 5px;\n            color: white;\n        }\n    </style>\n</head>\n<body>\n    <h1>Random Pokémon</h1>\n    <div id=\"pokemon\"></div>\n    <button id=\"random-btn\">Get Random Pokémon</button>\n    <script>\n        async function getRandomPokemon() {\n            const response = await fetch(\"https://pokeapi.co/api/v2/pokemon/\" + Math.floor(Math.random() * 898 + 1));\n            const data = await response.json();\n            displayPokemon(data);\n        }\n\n        function displayPokemon(pokemon) {\n            const pokemonDiv = document.getElementById(\"pokemon\");\n            pokemonDiv.innerHTML = \"<h2>\" + pokemon.name + \"</h2>\";\n            pokemonDiv.innerHTML += \"<img src=\"\" + pokemon.sprites.front_default + \"\" alt=\"\
